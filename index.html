<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Overdrive: Hardcore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; overflow: hidden; background: #020005; font-family: 'Orbitron', sans-serif; user-select: none; }
        
        #ui-hud {
            position: absolute; top: 20px; left: 0; width: 100%; padding: 0 30px;
            display: flex; justify-content: space-between; align-items: center;
            color: #00ff9d; font-size: 22px; text-shadow: 0 0 10px #00ff9d; z-index: 50; box-sizing: border-box;
        }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(2, 0, 5, 0.9); z-index: 100;
        }
        
        h1 { font-size: 70px; color: #ff00ff; text-shadow: 0 0 30px #ff00ff; margin: 0; text-align: center; }
        .btn {
            background: #00ff9d; color: #000; border: none; padding: 15px 60px;
            font-size: 20px; font-weight: 900; cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 20px #00ff9d; margin-top: 15px; font-family: 'Orbitron'; min-width: 250px;
        }
        .btn-alt { background: #ff00ff; box-shadow: 0 0 20px #ff00ff; color: white; }
        
        #pause-btn {
            background: rgba(0, 255, 157, 0.2); color: #00ff9d; border: 1px solid #00ff9d;
            padding: 8px 15px; cursor: pointer; border-radius: 4px; font-family: 'Orbitron';
        }
    </style>
</head>
<body>

    <div id="ui-hud">
        <div><button id="pause-btn">PAUSE ||</button> &nbsp; DIST: <span id="score">0</span>m</div>
        <div style="color:#ff00ff">⚡ <span id="coins">0</span></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>NEON RUN</h1>
        <p style="color: #00d4ff;">DODGE TRAINS | SLIDE BARRIERS</p>
        <button class="btn" onclick="startGame()">START RUN</button>
    </div>

    <div id="pause-menu" class="overlay" style="display:none;">
        <h1 style="color: #00d4ff; text-shadow: 0 0 20px #00d4ff;">PAUSED</h1>
        <button class="btn" onclick="resumeGame()">RESUME</button>
        <button class="btn btn-alt" onclick="location.reload()">RESTART</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none;">
        <h1 style="color: #ff0055;">CRASHED</h1>
        <p style="color:white; font-size: 24px;">TOTAL COINS: <span id="final-coins">0</span></p>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Config ---
        const LANES = [-5, 0, 5];
        let currentLane = 1, score = 0, coinCount = 0;
        let gameActive = false, isPaused = false;
        let speed = 0.8;
        let isJumping = false, jumpVel = 0, isSliding = false;
        const gravity = -0.016;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d, v=0.05) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020005);
        scene.fog = new THREE.Fog(0x1a0033, 10, 180);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 25);
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // --- Road & Marks ---
        const road = new THREE.Mesh(new THREE.PlaneGeometry(24, 2000), new THREE.MeshStandardMaterial({ color: 0x050505 }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const markings = [];
        for(let i=0; i<40; i++) {
            const m = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 6), new THREE.MeshBasicMaterial({ color: 0x00ff9d }));
            m.rotation.x = -Math.PI / 2;
            m.position.set(0, 0.1, -i * 20);
            scene.add(m); markings.push(m);
        }

        const buildings = [];
        function createBuilding(z) {
            const side = Math.random() > 0.5 ? 40 : -40;
            const h = 50 + Math.random() * 100;
            const group = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), new THREE.MeshStandardMaterial({ color: 0x000000 }));
            const trim = new THREE.Mesh(new THREE.BoxGeometry(1.5, h, 21), new THREE.MeshBasicMaterial({ color: 0x00d4ff }));
            trim.position.x = side > 0 ? -10.1 : 10.1;
            group.add(b, trim); group.position.set(side, h/2, z);
            scene.add(group); buildings.push(group);
        }
        for(let i=0; i<40; i++) createBuilding(-i * 30);

        const player = new THREE.Group();
        const pMat = new THREE.MeshStandardMaterial({ color: 0x00ff9d, emissive: 0x00ff9d, emissiveIntensity: 2 });
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.6, 1.2, 4, 8), pMat); torso.position.y = 2.4;
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), pMat); head.position.y = 3.6;
        const lLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 1, 4, 8), pMat); lLeg.position.set(-0.5, 1.2, 0);
        const rLeg = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 1, 4, 8), pMat); rLeg.position.set(0.5, 1.2, 0);
        player.add(torso, head, lLeg, rLeg);
        scene.add(player);

        const obstacles = [], coins = [];
        function spawn() {
            if(!gameActive || isPaused) return;
            const lane = LANES[Math.floor(Math.random()*3)];
            const type = Math.random();

            if (type < 0.3) { 
                // LONG MEGA TRAIN (TOO HIGH TO JUMP)
                const train = new THREE.Mesh(new THREE.BoxGeometry(4, 15, 25), new THREE.MeshStandardMaterial({ color: 0x330066 }));
                train.position.set(lane, 7.5, -250);
                train.userData.type = 'mega';
                scene.add(train); obstacles.push(train);
            } else if (type < 0.5) { 
                // SLIDE BARRIER
                const bar = new THREE.Mesh(new THREE.BoxGeometry(6, 1.5, 1), new THREE.MeshStandardMaterial({ color: 0xff00ff }));
                bar.position.set(lane, 4.2, -250);
                bar.userData.type = 'slide';
                scene.add(bar); obstacles.push(bar);
            } else if (type < 0.7) {
                // JUMPABLE BOX
                const box = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 3), new THREE.MeshStandardMaterial({ color: 0x00d4ff }));
                box.position.set(lane, 1.25, -250);
                box.userData.type = 'jump';
                scene.add(box); obstacles.push(box);
            } else { 
                // COIN
                const c = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.15, 8, 16), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
                c.position.set(lane, 1.8, -250); scene.add(c); coins.push(c);
            }
            setTimeout(spawn, Math.max(150, 1000 - speed * 120));
        }

        window.startGame = () => { document.getElementById('start-screen').style.display = 'none'; gameActive = true; spawn(); animate(); };
        window.resumeGame = () => { document.getElementById('pause-menu').style.display = 'none'; isPaused = false; animate(); };
        document.getElementById('pause-btn').onclick = () => { isPaused = true; document.getElementById('pause-menu').style.display = 'flex'; };

        window.addEventListener('keydown', (e) => {
            if(!gameActive || isPaused) return;
            if(e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
            if(e.key === 'ArrowRight' && currentLane < 2) currentLane++;
            if((e.key === 'ArrowUp' || e.key === ' ') && !isJumping) { isJumping = true; jumpVel = 0.52; playSfx(550, 'sine', 0.2); }
            if(e.key === 'ArrowDown' && !isJumping && !isSliding) {
                isSliding = true; player.scale.y = 0.4; playSfx(250, 'sawtooth', 0.2);
                setTimeout(() => { isSliding = false; player.scale.y = 1; }, 750);
            }
        });

        function animate() {
            if(!gameActive || isPaused) return;
            requestAnimationFrame(animate);
            speed += 0.0005; // Rapidly getting faster
            score += speed;
            document.getElementById('score').innerText = Math.floor(score/5);

            markings.forEach(m => { m.position.z += speed; if(m.position.z > 30) m.position.z = -300; });
            buildings.forEach(b => { b.position.z += speed; if(b.position.z > 50) b.position.z = -600; });

            player.position.x += (LANES[currentLane] - player.position.x) * 0.22;
            if (!isJumping && !isSliding) {
                lLeg.rotation.x = Math.sin(Date.now() * 0.015 * speed) * 1.3;
                rLeg.rotation.x = -Math.sin(Date.now() * 0.015 * speed) * 1.3;
            }
            if(isJumping) { player.position.y += jumpVel; jumpVel += gravity; if(player.position.y <= 0) { player.position.y = 0; isJumping = false; } }

            [...obstacles, ...coins].forEach((obj, i) => {
                obj.position.z += speed;
                const dX = Math.abs(player.position.x - obj.position.x);
                const dZ = Math.abs(player.position.z - obj.position.z);
                if(dX < 2.8 && dZ < 3) {
                    if(obj.geometry.type === "TorusGeometry") {
                        playSfx(1100, 'triangle', 0.1); scene.remove(obj);
                        coins.splice(coins.indexOf(obj), 1); coinCount++;
                        document.getElementById('coins').innerText = coinCount;
                    } else {
                        let hit = false;
                        if(obj.userData.type === 'mega') hit = true; // Mega trains are too high to jump!
                        if(obj.userData.type === 'slide' && !isSliding) hit = true;
                        if(obj.userData.type === 'jump' && player.position.y < 3) hit = true;
                        if(hit) {
                            gameActive = false; playSfx(60, 'square', 0.8, 0.4);
                            document.getElementById('game-over-screen').style.display = 'flex';
                            document.getElementById('final-coins').innerText = coinCount;
                        }
                    }
                }
                if(obj.position.z > 40) scene.remove(obj);
            });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
